# set space key as interptur
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-battery'


# tooling
set -g @plugin 'omerxx/tmux-sessionx'          # prefix + o


# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'


### configure plugins
#
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status 'no'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_current_color '#{E:@thm_surface_2}'
set -g @catppuccin_date_time_text '%d.%m.%Y %I:%M %p'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'


# set left and right status bar
set -g status-right ""
set -g allow-rename off
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session}'
if 'test -r /sys/class/power_supply/BAT*' {
  set -agF status-right '#{E:@catppuccin_status_battery}'
}
set -ag status-right '#{E:@catppuccin_status_date_time}'

# start index at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# renumber when window is closed
set -g renumber-windows on

# custom key bindings
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection 
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-slection-and-cancel

bind -n M-H previous-window
bind -n M-L next-window

# Override the 'unknown' battery icon when in Conservation Mode
set -g @batt_icon_status_attached "󰂄"
set -g @batt_icon_status_unknown "󰂄"

# enable mouse
set -g mouse on

# enable 256-colors
set -g default-terminal 'screen-256color'
set -ag terminal-overrides ',xterm-256color*:RGB'
# set-option -sa terminal-overrides ",xterm.Tc"

run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
